version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aionforge
      POSTGRES_PASSWORD: aionforge_dev
      POSTGRES_DB: aionforge_revenue_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aionforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://aionforge:aionforge_dev@postgres:5432/aionforge_revenue_os
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: INFO
      GUMROAD_API_KEY: ${GUMROAD_API_KEY}
      GUMROAD_WEBHOOK_SECRET: ${GUMROAD_WEBHOOK_SECRET}
      NOTION_API_KEY: ${NOTION_API_KEY}
      NOTION_DATABASE_ID: ${NOTION_DATABASE_ID}
      EMAIL_API_KEY: ${EMAIL_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app

volumes:
  postgres_data:
